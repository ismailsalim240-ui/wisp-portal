<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wisp Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #000814; color: #00d4ff; font-family: sans-serif; text-align: center; padding: 50px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid #00d4ff33; border-radius: 20px; padding: 20px; margin: 10px auto; max-width: 400px; }
        button { width: 100%; padding: 15px; margin-top: 10px; cursor: pointer; background: #00d4ff; border: none; font-weight: bold; border-radius: 10px; }
        #auth-overlay { position: fixed; inset: 0; background: #000814; display: flex; align-items: center; justify-content: center; z-index: 10; }
    </style>
</head>
<body>
    <div id="auth-overlay">
        <button onclick="firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider())" style="width:200px">Login with Google</button>
    </div>
    <h1>SCINTILLATING WISP</h1>
    <div class="card"><h2 id="clock">00:00:00</h2><button onclick="log()">Log Venture</button></div>
    <div class="card"><h3>History</h3><div id="hist"></div></div>
    <script>
        const config = {
            apiKey: "AIzaSyBsZbI5aEOM70XgxuysGrlYTZ_vBMf3Fsg",
            authDomain: "ismah-aaa28.firebaseapp.com",
            databaseURL: "https://ismah-aaa28-default-rtdb.firebaseio.com",
            projectId: "ismah-aaa28",
            appId: "1:46463400864:web:0762edb1dd99aacdc402c5"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        firebase.auth().onAuthStateChanged(u => {
            document.getElementById('auth-overlay').style.display = u ? 'none' : 'flex';
            if(u) db.ref('u/'+u.uid).on('value', s => {
                const data = s.val() || {};
                document.getElementById('hist').innerHTML = Object.values(data).reverse().map(l => `<div>${l.t} - ${l.v}</div>`).join('');
            });
        });
        function log() {
            const u = firebase.auth().currentUser;
            if(u) db.ref('u/'+u.uid).push({v: "INIT_FLOW", t: new Date().toLocaleTimeString()});
        }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
