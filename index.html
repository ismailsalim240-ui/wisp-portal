<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidden Empire Experience</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#05070f;
    overflow:hidden;
    color:white;
}

/* HERO TEXT */
.hero{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    z-index:10;
}

.hero h1{
    font-size:60px;
    letter-spacing:2px;
}

.hero p{
    margin-top:10px;
    opacity:0.6;
}

button{
    margin-top:20px;
    padding:14px 30px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,orange,gold);
    color:black;
    cursor:pointer;
    font-weight:bold;
    box-shadow:0 0 20px rgba(255,165,0,0.5);
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

/* GLASS NAV */
.nav{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    padding:10px 30px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    border-radius:50px;
    z-index:10;
}

.nav a{
    margin:0 10px;
    color:white;
    text-decoration:none;
    font-size:14px;
}
</style>
</head>

<body>

<div class="nav">
    <a href="#">Home</a>
    <a href="#">Experience</a>
    <a href="#">Contact</a>
</div>

<div class="hero">
    <h1>HIDDEN EMPIRE</h1>
    <p>Enter the Future of Digital Wealth</p>
    <button>Enter Experience</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.domElement.style.position="fixed";
renderer.domElement.style.top="0";
renderer.domElement.style.zIndex="-1";

document.body.appendChild(renderer.domElement);

/* 🔥 CORE ENERGY SPHERE */
const geometry = new THREE.SphereGeometry(1,64,64);

const material = new THREE.MeshStandardMaterial({
    color:0xff6600,
    emissive:0xff2200,
    roughness:0.3,
    metalness:0.8
});

const sphere = new THREE.Mesh(geometry, material);
scene.add(sphere);

/* 💡 LIGHTS */
const light = new THREE.PointLight(0xff5500, 2);
light.position.set(2,2,2);
scene.add(light);

/* 🔥 PARTICLES */
const particlesCount = 4000;
const posArray = new Float32Array(particlesCount * 3);

for(let i=0;i<particlesCount*3;i++){
    posArray[i] = (Math.random()-0.5)*6;
}

const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute(
    "position",
    new THREE.BufferAttribute(posArray,3)
);

const pMat = new THREE.PointsMaterial({
    size:0.02,
    color:0xff8800
});

const particles = new THREE.Points(pGeo,pMat);
scene.add(particles);

camera.position.z = 3;

/* 🖱️ MOUSE */
let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove",(e)=>{
    mouseX = (e.clientX/window.innerWidth - 0.5);
    mouseY = (e.clientY/window.innerHeight - 0.5);
});

/* 🎬 ANIMATION */
function animate(){
    requestAnimationFrame(animate);

    sphere.rotation.y += 0.01;
    sphere.rotation.x += 0.005;

    particles.rotation.y += 0.001;

    sphere.position.x = mouseX;
    sphere.position.y = -mouseY;

    renderer.render(scene,camera);
}

animate();

/* 📱 RESPONSIVE */
window.addEventListener("resize",()=>{
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
});
</script>

</body>
</html>
