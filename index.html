<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scintillating Wisp | v5.8 Ultra-Sentinel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400;600;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #00d4ff;
            --primary-glow: rgba(0, 212, 255, 0.3);
            --ink: #000814;
            --border: rgba(0, 212, 255, 0.15);
            --surface: rgba(2, 6, 23, 0.85);
            --gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.3);
        }

        .theme-gold {
            --primary: #D4AF37;
            --primary-glow: rgba(212, 175, 55, 0.3);
            --border: rgba(212, 175, 55, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.5s, border 0.5s; }
        body { background: var(--ink); color: #f8fafc; font-family: 'Montserrat', sans-serif; overflow-x: hidden; min-height: 100vh; }

        /* --- Global Ticker --- */
        .task-ticker {
            width: 100%; background: rgba(0, 212, 255, 0.05); border-bottom: 1px solid var(--border);
            padding: 12px 0; text-align: center; font-family: 'JetBrains Mono';
            font-size: 10px; letter-spacing: 4px; color: var(--primary);
            position: sticky; top: 0; z-index: 100; backdrop-filter: blur(15px);
            text-transform: uppercase;
        }

        /* --- Atmospheric Background --- */
        .water-bg { position: fixed; inset: 0; z-index: -1; background: linear-gradient(180deg, var(--ink) 0%, #001d3d 100%); overflow: hidden; }
        .ripple { position: absolute; border: 1px solid var(--primary); border-radius: 50%; animation: ripple-effect 8s infinite linear; opacity: 0; pointer-events: none; }
        @keyframes ripple-effect { 0% { transform: scale(0.5); opacity: 0; } 50% { opacity: 0.1; } 100% { transform: scale(2.5); opacity: 0; } }

        /* --- Auth Overlay --- */
        #auth-overlay { position: fixed; inset: 0; background: var(--ink); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 30px; }

        /* --- Layout --- */
        .layout { max-width: 1200px; margin: 0 auto; padding: 40px 20px; display: grid; grid-template-columns: 1fr 380px; gap: 30px; position: relative; z-index: 10; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 35px; padding: 35px; backdrop-filter: blur(30px); margin-bottom: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
        
        /* --- Buttons & UI --- */
        .brand-name { font-size: 28px; letter-spacing: 12px; font-weight: 700; text-transform: uppercase; text-align: center; }
        .btn-fluid { width: 100%; padding: 22px; border-radius: 20px; font-weight: 700; cursor: pointer; letter-spacing: 4px; border: none; text-transform: uppercase; background: var(--primary); color: #000; }
        .btn-locked { background: transparent; border: 1px solid #334155; color: #444; cursor: not-allowed; }

        /* --- Protocols --- */
        .goal-row { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 15px; margin-bottom: 12px; cursor: pointer; border: 1px solid transparent; }
        .goal-row.checked { border-color: var(--gold-glow); background: rgba(212, 175, 55, 0.05); }
        .check-box { width: 24px; height: 24px; border: 2px solid var(--gold); border-radius: 8px; position: relative; }
        .check-box.active::after { content: '✓'; position: absolute; top: -5px; left: 3px; color: var(--gold); font-size: 20px; font-weight: 900; }

        .history-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 15px; }
        .history-table th { color: var(--primary); text-align: left; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .history-table td { padding: 12px 0; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono'; }

        @media (max-width: 950px) { .layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body id="main-body">

    <div id="auth-overlay">
        <h1 class="brand-name">SCINTILLATING WISP</h1>
        <button onclick="login()" class="btn-fluid" style="max-width: 320px;">Unlock with Google</button>
    </div>

    <div class="task-ticker" id="live-ticker">INITIALIZING CLOUD SENTINEL...</div>
    <div class="water-bg" id="ripples"></div>

    <div class="layout">
        <div class="main-stack">
            <div class="brand-name" style="margin-bottom: 40px;">COMMAND PORTAL</div>
            
            <div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <span style="font-size:10px; letter-spacing:3px; opacity:0.5;">GROWTH PULSE</span>
                    <button onclick="toggleTheme()" style="background:none; border:1px solid var(--border); color:var(--primary); font-size:9px; padding:5px 10px; border-radius:5px; cursor:pointer;">THEME SWITCH</button>
                </div>
                <div style="height: 250px;"><canvas id="mainChart"></canvas></div>
            </div>

            <div class="card">
                <h3 style="font-size:10px; letter-spacing:5px; color:var(--gold); margin-bottom:25px; text-transform:uppercase;">Spiritual Protocol</h3>
                <div class="goal-row" onclick="toggleGoal('prayers')"><span>5 Daily Prayers 🏰</span><div class="check-box" id="check-prayers"></div></div>
                <div class="goal-row" onclick="toggleGoal('quran')"><span>Quran Recitation 📖</span><div class="check-box" id="check-quran"></div></div>
                <div class="goal-row" onclick="toggleGoal('sadaqah')"><span>Daily Sadaqah 🤲</span><div class="check-box" id="check-sadaqah"></div></div>
            </div>

            <div class="card">
                <h3 style="font-size:10px; letter-spacing:5px; opacity:0.5; margin-bottom:20px;">VENTURE HISTORY</h3>
                <table class="history-table">
                    <thead><tr><th>Type</th><th>Time</th><th>Status</th></tr></thead>
                    <tbody id="history-body"></tbody>
                </table>
            </div>
        </div>

        <div class="side-stack">
            <div class="card" style="text-align: center;">
                <span id="p-status" style="font-size:10px; letter-spacing:3px; opacity:0.5;">SYSTEM LIVE</span>
                <div id="clock" style="font-family: 'JetBrains Mono'; font-size: 3rem; margin: 20px 0;">00:00:00</div>
                <button id="gate-btn" onclick="logVenture()" class="btn-fluid">Initialize Flow</button>
            </div>
            
            <div class="card" style="text-align:center;">
                <button onclick="firebase.auth().signOut()" style="background:none; border:none; color:#444; font-size:10px; cursor:pointer; letter-spacing:2px;">TERMINATE SESSION</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBsZbI5aEOM70XgxuysGrlYTZ_vBMf3Fsg",
            authDomain: "ismah-aaa28.firebaseapp.com",
            databaseURL: "https://ismah-aaa28-default-rtdb.firebaseio.com",
            projectId: "ismah-aaa28",
            storageBucket: "ismah-aaa28.firebasestorage.app",
            messagingSenderId: "46463400864",
            appId: "1:46463400864:web:0762edb1dd99aacdc402c5"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const provider = new firebase.auth.GoogleAuthProvider();
        let currentStatus = "IDLE";

        function login() { firebase.auth().signInWithPopup(provider); }

        firebase.auth().onAuthStateChanged(user => {
            document.getElementById('auth-overlay').style.display = user ? 'none' : 'flex';
            if (user) { syncCloud(user.uid); }
        });

        function syncCloud(uid) {
            db.ref('u/'+uid+'/goals').on('value', snap => {
                const goals = snap.val() || {};
                ['prayers', 'quran', 'sadaqah'].forEach(id => {
                    const box = document.getElementById('check-' + id);
                    box.className = goals[id] ? 'check-box active' : 'check-box';
                    box.parentElement.className = goals[id] ? 'goal-row checked' : 'goal-row';
                });
            });

            db.ref('u/'+uid+'/history').limitToLast(10).on('value', snap => {
                const logs = snap.val() || {};
                document.getElementById('history-body').innerHTML = Object.values(logs).reverse().map(l => 
                    `<tr><td>${l.type}</td><td>${l.time}</td><td style="color:var(--primary)">VERIFIED</td></tr>`
                ).join('');
            });
        }

        function toggleGoal(id) {
            const uid = firebase.auth().currentUser.uid;
            const el = document.getElementById('check-' + id);
            db.ref('u/'+uid+'/goals/'+id).set(!el.classList.contains('active'));
        }

        function logVenture() {
            if (currentStatus === "LOCKED") return;
            const uid = firebase.auth().currentUser.uid;
            db.ref('u/'+uid+'/history').push({ type: "VENTURE_INIT", time: new Date().toLocaleTimeString() });
        }

        function updateSystem() {
            const now = new Date();
            const hrs = now.getHours();
            const clock = document.getElementById('clock');
            const btn = document.getElementById('gate-btn');
            const ticker = document.getElementById('live-ticker');
            
            clock.innerText = now.toLocaleTimeString();
            
            if ((hrs >= 3 && hrs < 10) || (hrs >= 15 && hrs < 22)) {
                currentStatus = "LIVE";
                btn.className = "btn-fluid";
                btn.innerText = "Initialize Flow";
                ticker.innerText = "SYSTEM ACTIVE // FLOW INITIALIZED";
            } else {
                currentStatus = "LOCKED";
                btn.className = "btn-fluid btn-locked";
                btn.innerText = "Vault Locked";
                ticker.innerText = "VAULT SECURED // STANDBY MODE";
            }
        }

        function toggleTheme() { document.getElementById('main-body').classList.toggle('theme-gold'); }

        // Visual Init
        const rip = document.getElementById('ripples');
        for(let i=0; i<6; i++) {
            const r = document.createElement('div'); r.className = 'ripple';
            r.style.width = r.style.height = Math.random()*300+200+'px';
            r.style.left = Math.random()*100+'%'; r.style.top = Math.random()*100+'%';
            r.style.animationDelay = (i*1.5)+'s'; rip.appendChild(r);
        }

        const ctx = document.getElementById('mainChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: { labels: ['M','T','W','T','F','S','S'], datasets: [{ data: [4.2, 5.1, 4.8, 6.1, 6.4, 6.7, 6.84], borderColor: '#00d4ff', tension: 0.4, fill: true, backgroundColor: 'rgba(0, 212, 255, 0.05)' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });

        setInterval(updateSystem, 1000);
    </script>
</body>
</html>
