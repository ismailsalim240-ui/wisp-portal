<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Muslim Animation & Hadith Website</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            padding: 16px;
        }

        .video-thumbnail {
            cursor: pointer;
            width: 300px;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .video-thumbnail img {
            width: 100%;
            border-radius: 8px;
            transition: transform 0.3s;
        }

        .video-thumbnail:hover img {
            transform: scale(1.05);
        }

        .modal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background-color: rgba(0, 0, 0, 0.8); 
            justify-content: center; 
            align-items: center; 
        }

        .modal-content {
            position: relative; 
            width: 80%; 
            max-width: 800px; 
        }

        .modal-content iframe {
            width: 100%; 
            height: 450px; 
        }

        .close {
            position: absolute; 
            top: 10px; right: 20px; 
            color: white; 
            font-size: 24px; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <h1 style="text-align:center;">Popular Muslim Animations</h1>
    <div class="gallery">
        <div class="video-thumbnail" data-video-id="VIDEO_ID_1" data-hadith-id="HADITH_ID_1">
            <img src="https://img.youtube.com/vi/VIDEO_ID_1/0.jpg" alt="Animation 1">
            <p style="text-align:center;">Animation Title 1</p>
        </div>
        <div class="video-thumbnail" data-video-id="VIDEO_ID_2" data-hadith-id="HADITH_ID_2">
            <img src="https://img.youtube.com/vi/VIDEO_ID_2/0.jpg" alt="Animation 2">
            <p style="text-align:center;">Animation Title 2</p>
        </div>
        <!-- Add more video thumbnails as necessary -->
    </div>

    <div class="modal" id="videoModal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <iframe id="videoPlayer" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const thumbnails = document.querySelectorAll('.video-thumbnail');
        const modal = document.getElementById('videoModal');
        const videoPlayer = document.getElementById('videoPlayer');
        const closeModal = document.getElementById('closeModal');

        thumbnails.forEach(thumbnail => {
            thumbnail.addEventListener('click', () => {
                const videoId = thumbnail.getAttribute('data-video-id');
                const hadithId = thumbnail.getAttribute('data-hadith-id');

                videoPlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
                modal.style.display = 'flex';

                // You can add logic here to play the corresponding Hadith video 
                // using hadithId if needed.
            });
        });

        closeModal.addEventListener('click', () => {
            modal.style.display = 'none';
            videoPlayer.src = ''; // Stop the video when modal is closed
        });

        window.onclick = (event) => {
            if (event.target === modal) {
                modal.style.display = 'none';
                videoPlayer.src = '';
            }
        };
    </script>
</body>
</html>
