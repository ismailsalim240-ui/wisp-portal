<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muslim Animation & Hadith Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    background: #020617;
    font-size: 1.5rem;
    font-weight: bold;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: #1e293b;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    display: block;
}

.card h3 {
    padding: 10px;
    font-size: 1rem;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
}

.modal-content {
    position: relative;
    margin: 5% auto;
    width: 90%;
    max-width: 900px;
}

.close {
    position: absolute;
    right: 10px;
    top: -40px;
    font-size: 30px;
    cursor: pointer;
}

.video-wrapper {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

iframe {
    width: 100%;
    height: 300px;
    border-radius: 10px;
}

@media (min-width: 768px) {
    iframe {
        height: 400px;
    }
}
</style>
</head>

<body>

<header>🕌 Muslim Animation & Hadith Hub</header>

<div class="grid" id="videoGrid"></div>

<!-- Modal -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">✖</span>
        <div class="video-wrapper">
            <iframe id="mainVideo" allow="autoplay"></iframe>
            <iframe id="hadithVideo" allow="autoplay"></iframe>
        </div>
    </div>
</div>

<script>
const videos = [
    {
        title: "Story of Prophet Muhammad (Animation)",
        animationId: "VIDEO_ID_1",
        hadithId: "HADITH_ID_1"
    },
    {
        title: "The Boy and The King",
        animationId: "VIDEO_ID_2",
        hadithId: "HADITH_ID_2"
    },
    {
        title: "Prophet Yusuf Story",
        animationId: "VIDEO_ID_3",
        hadithId: "HADITH_ID_3"
    }
];

// Load thumbnails
const grid = document.getElementById("videoGrid");

videos.forEach(video => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <img src="https://img.youtube.com/vi/${video.animationId}/hqdefault.jpg" loading="lazy">
        <h3>${video.title}</h3>
    `;

    card.onclick = () => openModal(video.animationId, video.hadithId);
    grid.appendChild(card);
});

// Open modal
function openModal(animationId, hadithId) {
    document.getElementById("modal").style.display = "block";

    document.getElementById("mainVideo").src =
        `https://www.youtube.com/embed/${animationId}?autoplay=1`;

    document.getElementById("hadithVideo").src =
        `https://www.youtube.com/embed/${hadithId}?autoplay=1`;
}

// Close modal
function closeModal() {
    document.getElementById("modal").style.display = "none";
    document.getElementById("mainVideo").src = "";
    document.getElementById("hadithVideo").src = "";
}

// Close on outside click
window.onclick = function(event) {
    const modal = document.getElementById("modal");
    if (event.target === modal) {
        closeModal();
    }
};
</script>

</body>
</html>
