<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Fragrant Flowers Blossom - HD Player</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
   <style>
       body {
           font-family: 'Inter', sans-serif;
           background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
           color: #e2e8f0;
           overflow-x: hidden;
       }

       /* Custom Scrollbar */
       ::-webkit-scrollbar {
           width: 8px;
       }
       ::-webkit-scrollbar-track {
           background: #0f172a; 
       }
       ::-webkit-scrollbar-thumb {
           background: #3b82f6; 
           border-radius: 4px;
       }
       ::-webkit-scrollbar-thumb:hover {
           background: #60a5fa; 
       }

       /* Glassmorphism Utilities */
       .glass {
           background: rgba(30, 41, 59, 0.7);
           backdrop-filter: blur(12px);
           -webkit-backdrop-filter: blur(12px);
           border: 1px solid rgba(255, 255, 255, 0.1);
       }

       .glass-panel {
           background: rgba(15, 23, 42, 0.85);
           backdrop-filter: blur(16px);
           border-left: 1px solid rgba(255, 255, 255, 0.05);
       }

       /* Range Slider Styling */
       input[type=range] {
           -webkit-appearance: none; 
           background: transparent; 
       }
       input[type=range]::-webkit-slider-thumb {
           -webkit-appearance: none;
           height: 16px;
           width: 16px;
           border-radius: 50%;
           background: #3b82f6;
           cursor: pointer;
           margin-top: -6px; 
           box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
       }
       input[type=range]::-webkit-slider-runnable-track {
           width: 100%;
           height: 4px;
           cursor: pointer;
           background: #475569;
           border-radius: 2px;
       }
       
       /* Animations */
       @keyframes fadeIn {
           from { opacity: 0; transform: translateY(10px); }
           to { opacity: 1; transform: translateY(0); }
       }
       .animate-fade-in {
           animation: fadeIn 0.5s ease-out forwards;
       }

       .playlist-item.active {
           background: rgba(59, 130, 246, 0.2);
           border-left: 4px solid #3b82f6;
       }

       /* Loader */
       .loader {
           border: 4px solid rgba(255, 255, 255, 0.1);
           border-left-color: #3b82f6;
           border-radius: 50%;
           width: 40px;
           height: 40px;
           animation: spin 1s linear infinite;
       }
       @keyframes spin {
           0% { transform: rotate(0deg); }
           100% { transform: rotate(360deg); }
       }
   </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 md:p-8 relative">

   <!-- Notification Bar -->
   <div id="notification" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 transition-all duration-300 opacity-0 translate-y-[-20px]">
       <div class="bg-blue-600/90 backdrop-blur-md text-white px-6 py-3 rounded-full shadow-lg border border-blue-400/30 flex items-center gap-3">
           <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
           <span id="notification-text" class="font-medium text-sm">Notification</span>
       </div>
   </div>

   <!-- Main Container -->
   <main class="w-full max-w-6xl glass rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row animate-fade-in h-[85vh] md:h-[800px]">
       
       <!-- Left Side: Video Player Area -->
       <div class="flex-1 flex flex-col relative bg-black">
           
           <!-- Video Info Header (Overlay) -->
           <div class="absolute top-0 left-0 w-full p-6 z-20 bg-gradient-to-b from-black/80 to-transparent pointer-events-none">
               <div class="flex justify-between items-start">
                   <div>
                       <h1 class="text-2xl md:text-3xl font-bold text-white tracking-tight drop-shadow-md">Fragrant Flowers Blossom</h1>
                       <p id="current-episode-title" class="text-blue-300 text-sm md:text-base mt-1 font-medium drop-shadow-sm">Episode 1 - Rintaro and Kaori</p>
                   </div>
                   <div class="flex items-center gap-2 pointer-events-auto">
                       <span class="px-2 py-1 bg-blue-600/80 backdrop-blur text-xs font-bold rounded text-white border border-blue-400/30">HD</span>
                       <span id="quality-badge" class="px-2 py-1 bg-white/10 backdrop-blur text-xs font-bold rounded text-white border border-white/20">1080p</span>
                   </div>
               </div>
           </div>

           <!-- Video Element -->
           <div class="relative flex-1 bg-black flex items-center justify-center group" id="video-container">
               <!-- Loading Spinner -->
               <div id="video-loader" class="absolute z-10 hidden">
                   <div class="loader"></div>
               </div>

               <video id="main-video" class="w-full h-full object-contain" poster="https://images.unsplash.com/photo-1490750967868-58cb75069ed6?q=80&w=2070&auto=format&fit=crop">
                   <source src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
                   Your browser does not support the video tag.
               </video>

               <!-- Big Play Button (Center) -->
               <div id="big-play-btn" class="absolute z-10 cursor-pointer transition-transform hover:scale-110 active:scale-95">
                   <div class="w-20 h-20 bg-blue-600/90 rounded-full flex items-center justify-center backdrop-blur-sm shadow-[0_0_30px_rgba(37,99,235,0.5)] border border-white/20">
                       <svg class="w-8 h-8 text-white ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                   </div>
               </div>

               <!-- Custom Controls Overlay -->
               <div id="controls-overlay" class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black/90 via-black/60 to-transparent p-4 md:p-6 transition-opacity duration-300 opacity-0 group-hover:opacity-100">
                   
                   <!-- Progress Bar -->
                   <div class="relative w-full h-1.5 bg-gray-600 rounded-full cursor-pointer mb-4 group/progress" id="progress-container">
                       <div id="progress-fill" class="absolute top-0 left-0 h-full bg-blue-500 rounded-full w-0 relative">
                           <div class="absolute right-0 top-1/2 transform -translate-y-1/2 w-3 h-3 bg-white rounded-full shadow opacity-0 group-hover/progress:opacity-100 transition-opacity"></div>
                       </div>
                       <div id="hover-time" class="absolute top-[-25px] text-xs text-white bg-black/80 px-2 py-1 rounded opacity-0 pointer-events-none transform -translate-x-1/2">00:00</div>
                   </div>

                   <!-- Buttons Row -->
                   <div class="flex justify-between items-center">
                       <div class="flex items-center gap-4">
                           <!-- Play/Pause -->
                           <button id="play-pause-btn" class="text-white hover:text-blue-400 transition-colors focus:outline-none">
                               <svg id="icon-play" class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                               <svg id="icon-pause" class="w-8 h-8 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                           </button>

                           <!-- Volume -->
                           <div class="flex items-center gap-2 group/volume">
                               <button id="mute-btn" class="text-white hover:text-blue-400 transition-colors">
                                   <svg id="icon-vol-high" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                                   <svg id="icon-vol-mute" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                               </button>
                               <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1" class="w-0 overflow-hidden group-hover/volume:w-24 transition-all duration-300 h-1 bg-gray-600 rounded-lg appearance-none cursor-pointer">
                           </div>

                           <!-- Time -->
                           <div class="text-xs md:text-sm font-mono text-gray-300 select-none">
                               <span id="current-time">00:00</span> / <span id="duration">00:00</span>
                           </div>
                       </div>

                       <div class="flex items-center gap-4">
                           <!-- Settings/Quality (Visual Only for this demo) -->
                           <button class="text-white hover:text-blue-400 transition-colors" title="Settings">
                               <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                           </button>

                           <!-- Fullscreen -->
                           <button id="fullscreen-btn" class="text-white hover:text-blue-400 transition-colors focus:outline-none">
                               <svg id="icon-fullscreen" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                               <svg id="icon-exit-fullscreen" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
                           </button>
                       </div>
                   </div>
               </div>
           </div>
       </div>

       <!-- Right Side: Playlist Sidebar -->
       <div id="playlist-sidebar" class="w-full md:w-80 glass-panel flex flex-col transition-all duration-300 absolute md:relative z-30 h-full transform translate-x-full md:translate-x-0">
           <div class="p-5 border-b border-white/10 flex justify-between items-center bg-slate-900/50">
               <h2 class="text-lg font-bold text-white flex items-center gap-2">
                   <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                   Episodes
               </h2>
               <button id="close-playlist-mobile" class="md:hidden text-gray-400 hover:text-white">
                   <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
               </button>
           </div>
           
           <div class="flex-1 overflow-y-auto p-3 space-y-2" id="playlist-container">
               <!-- Playlist items injected by JS -->
           </div>
       </div>
   </main>

   <!-- Toggle Playlist Button (Floating for Mobile/Desktop) -->
   <button id="toggle-playlist-btn" class="fixed bottom-8 right-8 md:bottom-auto md:top-8 md:right-8 z-40 bg-blue-600 hover:bg-blue-500 text-white p-3 rounded-full shadow-lg transition-transform hover:scale-110 active:scale-95 border border-blue-400/50 backdrop-blur-sm">
       <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
   </button>

   <script>
       // --- Data ---
       const episodes = [
           { id: 1, title: "Rintaro and Kaori", duration: "24:15", src: "http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4", thumb: "https://images.unsplash.com/photo-1526047932273-341f2a7631f9?w=500&auto=format&fit=crop&q=60" },
           { id: 2, title: "The Scent of Rain", duration: "23:40", src: "http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4", thumb: "https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?w=500&auto=format&fit=crop&q=60" },
           { id: 3, title: "Blossoms in the Wind", duration: "24:05", src: "http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4", thumb: "https://images.unsplash.com/photo-1490750967868-58cb75069ed6?w=500&auto=format&fit=crop&q=60" },
           { id: 4, title: "Memories of Kyoto", duration: "23:55", src: "http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4", thumb: "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=500&auto=format&fit=crop&q=60" },
           { id: 5, title: "The Garden's Secret", duration: "24:20", src: "http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4", thumb: "https://images.unsplash.com/photo-1585320806297-9794b3e4eeae?w=500&auto=format&fit=crop&q=60" },
           { id: 6, title: "Tea Ceremony", duration: "23:30", src: "http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4", thumb: "https://images.unsplash.com/photo-1531969179221-3926e727d704?w=500&auto=format&fit=crop&q=60" },
           { id: 7, title: "Autumn Leaves", duration: "24:00", src: "http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerMeltdowns.mp4", thumb: "https://images.unsplash.com/photo-1507371341162-763b5e419408?w=500&auto=format&fit=crop&q=60" },
           { id: 8, title: "Winter's End", duration: "24:45", src: "http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4", thumb: "https://images.unsplash.com/photo-1484313544071-4d6d46527bf8?w=500&auto=format&fit=crop&q=60" },
       ];

       // --- Elements ---
       const video = document.getElementById('main-video');
       const playPauseBtn = document.getElementById('play-pause-btn');
       const bigPlayBtn = document.getElementById('big-play-btn');
       const iconPlay = document.getElementById('icon-play');
       const iconPause = document.getElementById('icon-pause');
       const progressContainer = document.getElementById('progress-container');
       const progressFill = document.getElementById('progress-fill');
       const currentTimeEl = document.getElementById('current-time');
       const durationEl = document.getElementById('duration');
       const fullscreenBtn = document.getElementById('fullscreen-btn');
       const iconFullscreen = document.getElementById('icon-fullscreen');
       const iconExitFullscreen = document.getElementById('icon-exit-fullscreen');
       const videoContainer = document.getElementById('video-container');
       const playlistContainer = document.getElementById('playlist-container');
       const playlistSidebar = document.getElementById('playlist-sidebar');
       const togglePlaylistBtn = document.getElementById('toggle-playlist-btn');
       const closePlaylistMobile = document.getElementById('close-playlist-mobile');
       const currentEpisodeTitle = document.getElementById('current-episode-title');
       const volumeSlider = document.getElementById('volume-slider');
       const muteBtn = document.getElementById('mute-btn');
       const iconVolHigh = document.getElementById('icon-vol-high');
       const iconVolMute = document.getElementById('icon-vol-mute');
       const hoverTime = document.getElementById('hover-time');
       const notification = document.getElementById('notification');
       const notificationText = document.getElementById('notification-text');
       const videoLoader = document.getElementById('video-loader');

       let currentEpisodeIndex = 0;
       let isPlaylistOpen = false; // Mobile state

       // --- Initialization ---
       function init() {
           renderPlaylist();
           loadEpisode(0);
           setupEventListeners();
       }

       // --- Core Functions ---

       function showNotification(message) {
           notificationText.textContent = message;
           notification.classList.remove('opacity-0', 'translate-y-[-20px]');
           setTimeout(() => {
               notification.classList.add('opacity-0', 'translate-y-[-20px]');
           }, 3000);
       }

       function formatTime(seconds) {
           const m = Math.floor(seconds / 60);
           const s = Math.floor(seconds % 60);
           return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
       }

       function loadEpisode(index) {
           currentEpisodeIndex = index;
           const ep = episodes[index];
           
           video.src = ep.src;
           video.poster = ep.thumb; // Optional: use thumb as poster
           currentEpisodeTitle.textContent = `Episode ${ep.id} - ${ep.title}`;
           
           // Update playlist UI
           document.querySelectorAll('.playlist-item').forEach((item, i) => {
               if (i === index) {
                   item.classList.add('active');
                   item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
               } else {
                   item.classList.remove('active');
               }
           });

           video.load();
           showNotification(`Playing: ${ep.title}`);
           
           // Reset UI
           iconPlay.classList.remove('hidden');
           iconPause.classList.add('hidden');
           bigPlayBtn.style.display = 'flex';
           progressFill.style.width = '0%';
           currentTimeEl.textContent = '00:00';
       }

       function renderPlaylist() {
           playlistContainer.innerHTML = '';
           episodes.forEach((ep, index) => {
               const item = document.createElement('div');
               item.className = `playlist-item p-3 rounded-lg cursor-pointer transition-all duration-200 hover:bg-white/5 flex gap-3 items-center group`;
               item.innerHTML = `
                   <div class="relative w-24 h-14 flex-shrink-0 rounded overflow-hidden">
                       <img src="${ep.thumb}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" alt="Thumbnail">
                       <div class="absolute bottom-1 right-1 bg-black/80 text-[10px] px-1 rounded text-white">${ep.duration}</div>
                       <div class="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity">
                           <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                       </div>
                   </div>
                   <div class="flex-1 min-w-0">
                       <h3 class="text-sm font-semibold text-gray-200 group-hover:text-blue-400 truncate">Ep. ${ep.id} - ${ep.title}</h3>
                       <p class="text-xs text-gray-500 mt-0.5">Season 1</p>
                   </div>
               `;
               item.addEventListener('click', () => {
                   loadEpisode(index);
                   // On mobile, close sidebar after selection
                   if (window.innerWidth < 768) {
                       togglePlaylist();
                   }
               });
               playlistContainer.appendChild(item);
           });
       }

       function togglePlay() {
           if (video.paused) {
               video.play();
               iconPlay.classList.add('hidden');
               iconPause.classList.remove('hidden');
               bigPlayBtn.style.display = 'none';
           } else {
               video.pause();
               iconPlay.classList.remove('hidden');
               iconPause.classList.add('hidden');
               bigPlayBtn.style.display = 'flex';
           }
       }

       function toggleMute() {
           if (video.muted) {
               video.muted = false;
               volumeSlider.value = video.volume || 1;
               iconVolHigh.classList.remove('hidden');
               iconVolMute.classList.add('hidden');
           } else {
               video.muted = true;
               iconVolHigh.classList.add('hidden');
               iconVolMute.classList.remove('hidden');
           }
       }

       function toggleFullscreen() {
           if (!document.fullscreenElement) {
               if (videoContainer.requestFullscreen) {
                   videoContainer.requestFullscreen();
               } else if (videoContainer.webkitRequestFullscreen) { /* Safari */
                   videoContainer.webkitRequestFullscreen();
               }
           } else {
               if (document.exitFullscreen) {
                   document.exitFullscreen();
               }
           }
       }

       function togglePlaylist() {
           isPlaylistOpen = !isPlaylistOpen;
           if (isPlaylistOpen) {
               playlistSidebar.classList.remove('translate-x-full');
           } else {
               playlistSidebar.classList.add('translate-x-full');
           }
       }

       // --- Event Listeners ---

       function setupEventListeners() {
           // Video Events
           video.addEventListener('click', togglePlay);
           video.addEventListener('timeupdate', () => {
               const percent = (video.currentTime / video.duration) * 100;
               progressFill.style.width = `${percent}%`;
               currentTimeEl.textContent = formatTime(video.currentTime);
           });
           video.addEventListener('loadedmetadata', () => {
               durationEl.textContent = formatTime(video.duration);
           });
           video.addEventListener('ended', () => {
               iconPlay.classList.remove('hidden');
               iconPause.classList.add('hidden');
               bigPlayBtn.style.display = 'flex';
               // Auto play next
               if (currentEpisodeIndex < episodes.length - 1) {
                   setTimeout(() => loadEpisode(currentEpisodeIndex + 1), 1500);
               }
           });
           video.addEventListener('waiting', () => videoLoader.classList.remove('hidden'));
           video.addEventListener('playing', () => videoLoader.classList.add('hidden'));
           video.addEventListener('canplay', () => videoLoader.classList.add('hidden'));

           // Controls
           playPauseBtn.addEventListener('click', (e) => {
               e.stopPropagation();
               togglePlay();
           });
           bigPlayBtn.addEventListener('click', togglePlay);

           muteBtn.addEventListener('click', (e) => {
               e.stopPropagation();
               toggleMute();
           });

           volumeSlider.addEventListener('input', (e) => {
               video.volume = e.target.value;
               video.muted = false;
               if (video.volume === 0) {
                   iconVolHigh.classList.add('hidden');
                   iconVolMute.classList.remove('hidden');
               } else {
                   iconVolHigh.classList.remove('hidden');
                   iconVolMute.classList.add('hidden');
               }
           });

           fullscreenBtn.addEventListener('click', (e) => {
               e.stopPropagation();
               toggleFullscreen();
           });

           // Progress Bar
           progressContainer.addEventListener('click', (e) => {
               const rect = progressContainer.getBoundingClientRect();
               const pos = (e.clientX - rect.left) / rect.width;
               video.currentTime = pos * video.duration;
           });

           progressContainer.addEventListener('mousemove', (e) => {
               const rect = progressContainer.getBoundingClientRect();
               const pos = (e.clientX - rect.left) / rect.width;
               const time = pos * video.duration;
               
               hoverTime.style.left = `${e.clientX - rect.left}px`;
               hoverTime.textContent = formatTime(time);
               hoverTime.style.opacity = 1;
           });

           progressContainer.addEventListener('mouseleave', () => {
               hoverTime.style.opacity = 0;
           });

           // Fullscreen Change Detection
           document.addEventListener('fullscreenchange', () => {
               if (document.fullscreenElement) {
                   iconFullscreen.classList.add('hidden');
                   iconExitFullscreen.classList.remove('hidden');
               } else {
                   iconFullscreen.classList.remove('hidden');
                   iconExitFullscreen.classList.add('hidden');
               }
           });

           // Playlist Toggle
           togglePlaylistBtn.addEventListener('click', togglePlaylist);
           closePlaylistMobile.addEventListener('click', togglePlaylist);

           // Keyboard Shortcuts
           document.addEventListener('keydown', (e) => {
               if (e.code === 'Space') {
                   e.preventDefault(); // Prevent scrolling
                   togglePlay();
               } else if (e.code === 'ArrowRight') {
                   video.currentTime += 10;
                   showNotification('+10 seconds');
               } else if (e.code === 'ArrowLeft') {
                   video.currentTime -= 10;
                   showNotification('-10 seconds');
               } else if (e.code === 'KeyF') {
                   toggleFullscreen();
               }
           });
       }

       // Run
       document.addEventListener('DOMContentLoaded', init);

   </script>
</body>
</html>
