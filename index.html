<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Empire | 3D Sovereign Wealth</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #05070a; --glass: rgba(255, 255, 255, 0.03); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* 3D CANVAS LAYER */
        #webgl-bg { position: fixed; top: 0; left: 0; z-index: -1; outline: none; }

        /* NEUMORPHIC / GLASS UI */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .container { max-width: 1100px; margin: auto; padding: 20px; }
        nav { display: flex; justify-content: space-between; padding: 20px; align-items: center; }
        .hero { text-align: center; padding: 100px 0; }
        .hero h1 { font-size: 4rem; background: linear-gradient(to right, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; display: none; }
        .btn-prime {
            background: linear-gradient(45deg, var(--gold), #aa8a2e);
            color: black; border: none; padding: 15px 30px; border-radius: 12px;
            font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%;
        }
        .btn-prime:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }
        
        input { 
            width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.3); 
            border: 1px solid #333; color: white; border-radius: 8px;
        }

        .stat-box { text-align: center; padding: 20px; border-bottom: 2px solid var(--gold); }
        .hidden { display: none; }
    </style>
</head>
<body>

<canvas id="webgl-bg"></canvas>

<nav class="container">
    <h2 style="color:var(--gold)">HIDDEN EMPIRE</h2>
    <div id="nav-auth">
        <button class="btn-prime" onclick="toggleView('auth')">Access Terminal</button>
    </div>
</nav>

<main class="container">
    <section id="view-hero" class="hero">
        <h1>Sovereign Wealth. <br>Shariah-Compliant.</h1>
        <p style="color: #888; font-size: 1.2rem;">The 1% edge in Islamic Finance for the African Frontier.</p>
        <button class="btn-prime" style="width:auto;" onclick="toggleView('auth')">Initialize Protocol</button>
    </section>

    <section id="view-auth" class="hidden">
        <div class="glass-panel" style="max-width: 400px; margin: auto;">
            <h2 id="auth-title">Create Identity</h2>
            <input type="text" id="inp-name" placeholder="Full Legal Name">
            <input type="email" id="inp-email" placeholder="Secure Email">
            <input type="password" id="inp-pass" placeholder="Access Cipher">
            <button class="btn-prime" onclick="handleAuth()">Execute Entry</button>
            <p onclick="switchAuth()" style="cursor:pointer; font-size: 0.8rem; text-align:center; margin-top:10px;">Switch to Login</p>
        </div>
    </section>

    <section id="view-dash" class="dashboard-grid">
        <div class="glass-panel">
            <div class="stat-box">
                <small>TOTAL LIQUIDITY</small>
                <h1 id="txt-balance" style="color:var(--gold)">KES 0.00</h1>
            </div>
            <div class="stat-box">
                <small>ACTIVE MUDARABAH</small>
                <h3 id="txt-invested">KES 0.00</h3>
            </div>
            <button class="btn-prime" style="margin-top: 20px;" onclick="handleLogout()">Purge Session</button>
        </div>

        <div class="glass-panel">
            <h3>Deploy Capital (M-Pesa)</h3>
            <input type="number" id="inp-amount" placeholder="Amount (KES)">
            <input type="text" id="inp-phone" placeholder="2547XXXXXXXX">
            <button class="btn-prime" onclick="handleInvest()">Initialize STK Push</button>
            
            <hr style="border: 0.5px solid #333; margin: 20px 0;">
            
            <h3>Transaction Manifest</h3>
            <ul id="list-history" style="font-size: 0.9rem; list-style: none; padding: 0;"></ul>
        </div>
    </section>
</main>

<script>
/* ============================================================
   I. JSON SYSTEM STATE (The Sovereign Kernel)
   ============================================================ */
let SYSTEM_STATE = {
    isLoggedIn: false,
    authMode: 'register',
    user: null,
    config: {
        dailyRate: 0.05,
        currency: "KES",
        precision: 2
    }
};

/* ============================================================
   II. 3D ENGINE (Three.js WebGL)
   ============================================================ */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-bg'), antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);

// Particles: Gold Dust
const particlesGeometry = new THREE.BufferGeometry();
const particlesCount = 5000;
const posArray = new Float32Array(particlesCount * 3);

for(let i=0; i < particlesCount * 3; i++) {
    posArray[i] = (Math.random() - 0.5) * 10;
}
particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
const particlesMaterial = new THREE.PointsMaterial({ size: 0.005, color: 0xd4af37, transparent: true });
const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particlesMesh);

camera.position.z = 3;

function animate() {
    requestAnimationFrame(animate);
    particlesMesh.rotation.y += 0.001;
    particlesMesh.rotation.x += 0.0005;
    
    // Pulse effect based on balance (Subtle Logic)
    if(SYSTEM_STATE.user) {
        let pulse = 1 + (SYSTEM_STATE.user.invested / 100000);
        particlesMesh.scale.set(pulse, pulse, pulse);
    }
    
    renderer.render(scene, camera);
}
animate();

/* ============================================================
   III. OPERATIONAL LOGIC (The 80/20 Efficiency)
   ============================================================ */

function toggleView(view) {
    const views = ['view-hero', 'view-auth', 'view-dash'];
    views.forEach(v => document.getElementById(v).classList.add('hidden'));
    document.getElementById('view-dash').style.display = (view === 'dash') ? 'grid' : 'none';
    document.getElementById(`view-${view}`).classList.remove('hidden');
}

function handleAuth() {
    const email = document.getElementById('inp-email').value;
    const pass = document.getElementById('inp-pass').value;
    const name = document.getElementById('inp-name').value;

    if(SYSTEM_STATE.authMode === 'register') {
        const newUser = { name, email, pass, balance: 0, invested: 0, history: [] };
        localStorage.setItem(email, JSON.stringify(newUser));
        alert("Identity Validated.");
        switchAuth();
    } else {
        const stored = JSON.parse(localStorage.getItem(email));
        if(stored && stored.pass === pass) {
            SYSTEM_STATE.user = stored;
            SYSTEM_STATE.isLoggedIn = true;
            syncUI();
            toggleView('dash');
        } else {
            alert("Cipher Invalid.");
        }
    }
}

function handleInvest() {
    const amt = parseFloat(document.getElementById('inp-amount').value);
    if(isNaN(amt) || amt <= 0) return;

    // Simulate STK Push
    SYSTEM_STATE.user.invested += amt;
    SYSTEM_STATE.user.balance += (amt * 0.05); // Initial Mudarabah bonus
    SYSTEM_STATE.user.history.unshift(`DEPOSIT: +${amt} KES | ${new Date().toLocaleTimeString()}`);
    
    saveAndSync();
    alert("STK Push Sent. Capital Deployed.");
}

function saveAndSync() {
    localStorage.setItem(SYSTEM_STATE.user.email, JSON.stringify(SYSTEM_STATE.user));
    syncUI();
}

function syncUI() {
    if(!SYSTEM_STATE.user) return;
    document.getElementById('txt-balance').innerText = `KES ${SYSTEM_STATE.user.balance.toFixed(2)}`;
    document.getElementById('txt-invested').innerText = `KES ${SYSTEM_STATE.user.invested.toFixed(2)}`;
    
    const hist = document.getElementById('list-history');
    hist.innerHTML = SYSTEM_STATE.user.history.map(h => `<li style="padding:5px 0; border-bottom:1px solid #222">${h}</li>`).join('');
}

function switchAuth() {
    SYSTEM_STATE.authMode = (SYSTEM_STATE.authMode === 'register') ? 'login' : 'register';
    document.getElementById('auth-title').innerText = (SYSTEM_STATE.authMode === 'register') ? 'Create Identity' : 'Secure Login';
    document.getElementById('inp-name').style.display = (SYSTEM_STATE.authMode === 'register') ? 'block' : 'none';
}

function handleLogout() {
    location.reload();
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
