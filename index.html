<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisp Command | Sentinel Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #00d4ff;
            --primary-glow: rgba(0, 212, 255, 0.3);
            --ink: #000814;
            --border: rgba(0, 212, 255, 0.1);
            --surface: rgba(2, 6, 23, 0.8);
        }

        .theme-gold { --primary: #D4AF37; --primary-glow: rgba(212, 175, 55, 0.3); --border: rgba(212, 175, 55, 0.2); }
        .theme-emerald { --primary: #10b981; --primary-glow: rgba(16, 185, 129, 0.3); --border: rgba(16, 185, 129, 0.2); }
        .theme-ruby { --primary: #f43f5e; --primary-glow: rgba(244, 63, 94, 0.3); --border: rgba(244, 63, 94, 0.2); }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.5s ease; }
        body { background: var(--ink); color: #f8fafc; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        
        /* News Ticker */
        .news-wrap { width: 100%; background: #000; border-bottom: 1px solid var(--border); overflow: hidden; white-space: nowrap; padding: 10px 0; z-index: 2000; position: sticky; top: 0; }
        .news-content { display: inline-block; padding-left: 100%; font-family: 'JetBrains Mono'; font-size: 10px; color: var(--primary); letter-spacing: 2px; animation: scroll 25s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .layout { max-width: 600px; margin: 0 auto; padding: 20px; position: relative; z-index: 10; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; backdrop-filter: blur(15px); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .sub-tag { font-size: 9px; letter-spacing: 3px; opacity: 0.6; text-transform: uppercase; font-weight: 700; }
        
        .btn-fluid { width: 100%; padding: 18px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; background: var(--primary); color: #000; text-transform: uppercase; letter-spacing: 2px; }
        .btn-locked { background: transparent; border: 1px solid #334155; color: #334155; cursor: not-allowed; }

        .comment-list { max-height: 250px; overflow-y: auto; margin: 15px 0; }
        .comment-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--primary); font-size: 13px; }
        .comment-item small { display: block; font-size: 9px; opacity: 0.5; margin-top: 4px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #000; border: 1px solid var(--primary); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <div class="news-wrap">
        <div class="news-content" id="news-ticker">SYSTEM ONLINE • SECURE VENTURE PORTAL ACTIVE • NEW RECORDS RECORDED IN MARCH 2026</div>
    </div>

    <div class="layout">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <div>
                <h1 style="font-size: 14px; letter-spacing: 3px;">SCINTILLATING WISP</h1>
                <div id="theme-label" class="sub-tag" style="color: var(--primary);">CYBER BLUE</div>
            </div>
            <div class="sub-tag" style="color: #10b981;">● <span id="user-count">1</span> ONLINE</div>
        </header>

        <div class="card" style="text-align: center;">
            <span class="sub-tag">Total Capital Secured</span>
            <div style="font-family: 'JetBrains Mono'; font-size: 1.8rem; font-weight: 700; color: #fff; margin: 10px 0;">
                KSH <span id="total-capital">1,450,200</span>
            </div>
            <div style="height: 150px;"><canvas id="mainChart"></canvas></div>
        </div>

        <div class="card" style="text-align: center;">
            <div id="p-status" class="sub-tag">Vault Secured</div>
            <div id="clock" style="font-family: 'JetBrains Mono'; font-size: 2rem; margin: 10px 0;">00:00:00</div>
            <button id="gate-btn" class="btn-fluid btn-locked">Locked</button>
        </div>

        <div class="card">
            <span class="sub-tag">Community Live Feed</span>
            <div class="comment-list" id="comment-list"></div>
            <textarea id="com-input" style="width:100%; background:rgba(0,0,0,0.4); border:1px solid var(--border); padding:10px; color:#fff; border-radius:8px; margin-bottom:10px;" placeholder="Message..." rows="2"></textarea>
            <button class="btn-fluid" style="padding: 12px; font-size: 10px;" id="post-btn">SEND MESSAGE</button>
        </div>
    </div>

    <div class="modal" id="invest-modal">
        <div class="modal-content">
            <span class="sub-tag" style="color: var(--primary);">Gateway</span>
            <h2 style="margin: 20px 0;">MIN KSH. 100</h2>
            <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <span id="p-num" style="font-family:'JetBrains Mono'; font-weight:700;">0793837381</span>
                <button id="copy-btn" style="background:var(--primary); border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">COPY</button>
            </div>
            <button class="btn-fluid" id="close-modal">EXIT</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, query, limitToLast, remove, update, onDisconnect, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsZi5aE0N78Xgxuy sGrlYT", 
            authDomain: "ismah-aaa28.firebaseapp.com",
            projectId: "ismah-aaa28",
            databaseURL: "https://ismah-aaa28-default-rtdb.firebaseio.com",
            storageBucket: "ismah-aaa28.appspot.com",
            messagingSenderId: "46463400864",
            appId: "1:46463400864:web:1a9b0fa225f9c081c402c5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const ADMIN_PASS = "2220";

        // --- Presence ---
        const conRef = ref(db, 'connections');
        onValue(ref(db, '.info/connected'), (snap) => {
            if(snap.val()) {
                const c = push(conRef);
                onDisconnect(c).remove();
                set(c, true);
            }
        });
        onValue(conRef, (snap) => document.getElementById('user-count').innerText = snap.size || 1);

        // --- Capital Growth ---
        let capital = 1450200;
        setInterval(() => {
            capital += Math.floor(Math.random() * 200);
            document.getElementById('total-capital').innerText = capital.toLocaleString();
        }, 5000);

        // --- Comments & Admin ---
        const comRef = ref(db, 'comments');
        document.getElementById('post-btn').onclick = () => {
            const val = document.getElementById('com-input').value;
            if(val.trim()){
                push(comRef, { text: val, user: "User_"+Math.floor(Math.random()*999), verified: false });
                document.getElementById('com-input').value = '';
            }
        };

        onValue(query(comRef, limitToLast(15)), (snap) => {
            const list = document.getElementById('comment-list');
            list.innerHTML = '';
            snap.forEach(s => {
                const d = s.val();
                const id = s.key;
                const div = document.createElement('div');
                div.className = 'comment-item';
                div.innerHTML = `${d.text} <small>${d.user} ${d.verified ? '<span style="color:var(--primary)">☑</span>':''} • Admin</small>`;
                div.onclick = () => {
                    const act = prompt("Action: 'D' (Delete) or 'V' (Verify)");
                    const p = prompt("Password:");
                    if(p === ADMIN_PASS){
                        if(act?.toUpperCase()==='D') remove(ref(db, `comments/${id}`));
                        if(act?.toUpperCase()==='V') update(ref(db, `comments/${id}`), {verified:true});
                    }
                };
                list.prepend(div);
            });
        });

        // --- Interface ---
        setInterval(() => {
            const h = new Date().getHours();
            const b = document.getElementById('gate-btn');
            const s = document.getElementById('p-status');
            const active = (h >= 3 && h < 10) || (h >= 15 && h < 22);
            document.getElementById('clock').innerText = active ? "LIVE" : "LOCKED";
            if(active){
                b.className = "btn-fluid"; b.innerText = "Initialize Flow";
                s.innerText = "Portal Open"; s.style.color = "#10b981";
            } else {
                b.className = "btn-fluid btn-locked"; b.innerText = "Locked";
                s.innerText = "Vault Secured"; s.style.color = "";
            }
        }, 1000);

        const themes = [{c:'', l:'CYBER BLUE'}, {c:'theme-gold', l:'GOLD'}, {c:'theme-emerald', l:'EMERALD'}, {c:'theme-ruby', l:'RUBY'}];
        let tIdx = 0;
        setInterval(() => {
            document.body.classList.remove(...themes.map(t=>t.c).filter(c=>c));
            tIdx = (tIdx+1)%themes.length;
            if(themes[tIdx].c) document.body.classList.add(themes[tIdx].c);
            document.getElementById('theme-label').innerText = themes[tIdx].l;
        }, 60000);

        document.getElementById('gate-btn').onclick = () => { if(!document.getElementById('gate-btn').classList.contains('btn-locked')) document.getElementById('invest-modal').style.display='flex'; };
        document.getElementById('close-modal').onclick = () => document.getElementById('invest-modal').style.display='none';
        document.getElementById('copy-btn').onclick = (e) => { navigator.clipboard.writeText("0793837381"); e.target.innerText="DONE"; setTimeout(()=>e.target.innerText="COPY", 2000); };

        const ctx = document.getElementById('mainChart').getContext('2d');
        new Chart(ctx, { type: 'line', data: { labels: [1,2,3,4,5,6], datasets: [{ data: [4,5,4.2,6,5.5,6.8], borderColor: '#00d4ff', tension: 0.4, fill: true, backgroundColor: 'rgba(0,212,255,0.05)' }] }, options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{display:false},y:{display:false}} } });
    </script>
</body>
</html>
