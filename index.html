<html>
<head>
    <title>Wisp Command Portal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, rgba(255,223,186,1) 0%, rgba(255,223,186,0.5) 100%);
            color: #333;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        /* Add your animations and keyframes here */
        @keyframes waterMotion {
            0% { transform: translateY(0); }
            50% { transform: translateY(5px); }
            100% { transform: translateY(0); }
        }
        .animate {
            animation: waterMotion 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass animate">
            <h1>Welcome to Wisp Command Portal</h1>
            <div id="countdown"></div>
            <div id="yield-display"></div>
            <div id="discipline-flow"></div>
        </div>
    </div>
    <script>
        function startCountdown() {
            const countdownElement = document.getElementById('countdown');
            const targetDate = new Date();
            targetDate.setUTCHours(3, 0, 0, 0); // Friday 3 AM UTC
            const now = new Date();
            if (now.getUTCDay() > 5) {
                targetDate.setDate(targetDate.getUTCDate() + 7); // Next week
            }
            const timeDiff = targetDate - now;
            const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);
            countdownElement.innerHTML = `Countdown to Friday 3 AM: ${days}d ${hours}h ${minutes}m ${seconds}s`;
            setTimeout(startCountdown, 1000);
        }
        startCountdown();
    </script>
</body>
</html>
