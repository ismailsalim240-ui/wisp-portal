            height: 100%;

            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }

        .animation-delay-100 { animation-delay: 100ms; }
        .animation-delay-200 { animation-delay: 200ms; }

        .animation-delay-400 { animation-delay: 400ms; }

                                            <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="you@example.com" required style={{ flex: 1, padding: '12px 16px', background: 'var(--cream)', borderRadius: '999px', border: '2px solid transparent', outline: 'none', fontSize: '1rem' }} />
                                            <button type="submit" className="btn-primary" style={{ padding: '12px 24px' }}>
                                                {isSubmitted ? <><Icon name="sparkles" size={16} /> Subscribed!</> : <><Icon name="send" size={16} /> Subscribe</>}
                                            </button>
                                        </div>
                                        <p style={{ color: 'var(--text-secondary)', fontSize: '0.75rem', marginTop: '12px' }}>No spam. Unsubscribe anytime.</p>
                                    </form>
                                </div>
                                
                                <div className={`transition-all duration-700 ${isVisible ? 'opacity-100' : 'opacity-0'}`} style={{ display: 'flex', flexWrap: 'wrap', gap: '24px', marginBottom: '32px', transform: isVisible ? 'translateY(0)' : 'translateY(3vh)', transitionDelay: '300ms' }}>
                                    <a href="mailto:hello@islamickidstv.com" style={{ color: 'rgba(255,255,255,0.9)', display: 'flex', alignItems: 'center', gap: '8px', textDecoration: 'none' }}>
                                        <Icon name="mail" size={20} />
                                        hello@islamickidstv.com
                                    </a>
                                </div>
                                
                                <div className={`transition-all duration-700 ${isVisible ? 'opacity-100' : 'opacity-0'}`} style={{ display: 'flex', gap: '16px', transform: isVisible ? 'translateY(0)' : 'translateY(3vh)', transitionDelay: '400ms' }}>
                                    {socialLinks.map((social, i) => (
                                        <a key={i} href="#" aria-label={social.label} style={{ width: '48px', height: '48px', background: 'rgba(255,255,255,0.1)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white', transition: 'all 0.3s' }}>
                                            <Icon name={social.icon} size={20} fill={social.icon === 'youtube' || social.icon === 'facebook' ? 'currentColor' : 'none'} />
                                        </a>
                                    ))}
                                </div>
                            </div>
                        </div>
                        
                        <div style={{ marginTop: '64px', paddingTop: '32px', borderTop: '1px solid rgba(255,255,255,0.2)' }}>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '24px', alignItems: 'center', justifyContent: 'space-between' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
                                    <div style={{ width: '40px', height: '40px', background: 'var(--coral)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                        <Icon name="sparkles" size={20} className="text-white" style={{ color: 'white' }} />
                                    </div>
                                    <span style={{ fontFamily: 'Space Grotesk', fontWeight: 700, fontSize: '1.25rem', color: 'white' }}>Islamic Kids TV</span>
                                </div>
                                
                                <nav style={{ display: 'flex', flexWrap: 'wrap', gap: '24px', justifyContent: 'center' }}>
                                    {navLinks.map((link, i) => (
                                        <a key={i} href={`#${link.toLowerCase()}`} style={{ color: 'rgba(255,255,255,0.8)', fontFamily: 'Space Grotesk', fontWeight: 600, fontSize: '0.875rem', textTransform: 'uppercase', letterSpacing: '0.05em', textDecoration: 'none' }}>{link}</a>
                                    ))}
                                </nav>
                                
                                <p style={{ color: 'rgba(255,255,255,0.6)', fontSize: '0.875rem', display: 'flex', alignItems: 'center', gap: '4px' }}>
                                    Made with <Icon name="heart" size={16} fill="#E83737" style={{ color: 'var(--coral)' }} /> for Muslim families
                                </p>
                            </div>
                        </div>
                    </div>
                </footer>
            );
        };
        
        // App Component
        const App = () => {
            return (
                <div style={{ position: 'relative', minHeight: '100vh', background: 'var(--cream)' }}>
                    <div className="grain-overlay" />
                    <Navigation />
                    <main>
                        <Hero />
                        <VideoGallery />
                        <NasheedSection />
                        <ActivitiesSection />
                        <Footer />
                    </main>
                </div>
            );
        };
        
        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
