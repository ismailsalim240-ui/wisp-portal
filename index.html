<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation & Hadith Gallery</title>
    <style>
        /* CSS Variables for easy color themes */
        :root {
            --bg-color: #f8f9fa;
            --text-color: #333;
            --card-bg: #ffffff;
            --primary: #2c3e50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        h1 {
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 8px;
        }

        /* CSS Grid for Mobile-Responsive Gallery */
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        /* Animation Thumbnail Styling */
        .thumbnail {
            width: 100%;
            height: 180px;
            background-color: #ddd;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-icon::after {
            content: '';
            border-style: solid;
            border-width: 10px 0 10px 15px;
            border-color: transparent transparent transparent #fff;
            margin-left: 5px;
        }

        .card-content {
            padding: 15px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
        }

        /* Modal Overlay & Centering */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            width: 95%;
            max-width: 900px;
            background: #000;
            border-radius: 8px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            color: #fff;
            font-size: 2.5rem;
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
        }

        /* Forces a 16:9 Aspect Ratio for the embedded iframe */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 calculation */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 600px) {
            .close-btn {
                top: -35px;
                right: 5px;
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Animation & Hadith Gallery</h1>
        <p>Select an animation to watch the corresponding Hadith.</p>
    </header>

    <main class="gallery-container" id="gallery">
        </main>

    <div class="modal-overlay" id="videoModal">
        <div class="modal-content">
            <button class="close-btn" id="closeBtn">&times;</button>
            <div class="video-wrapper">
                <iframe id="youtubeIframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        // 1. DATA CONFIGURATION
        // Add your specific animation thumbnails and corresponding Hadith video IDs here.
        const videoData = [
            {
                title: "The Value of Honesty",
                // Thumbnail image for the front-end gallery (Animation)
                animationImg: "https://images.unsplash.com/photo-1546445317-29f4545e9d53?w=600&q=80", 
                // YouTube ID for the video that plays in the modal (Hadith)
                hadithVideoId: "dQw4w9WgXcQ" // <-- Replace with real YouTube ID
            },
            {
                title: "Respecting Parents",
                animationImg: "https://images.unsplash.com/photo-1511895426328-dc8714191300?w=600&q=80",
                hadithVideoId: "jNQXAC9IVRw" // <-- Replace with real YouTube ID
            },
            {
                title: "Kindness to Animals",
                animationImg: "https://images.unsplash.com/photo-1529156069898-49953eb1b5ce?w=600&q=80",
                hadithVideoId: "tgbNymZ7vqY" // <-- Replace with real YouTube ID
            }
        ];

        // 2. DOM ELEMENTS
        const gallery = document.getElementById('gallery');
        const modal = document.getElementById('videoModal');
        const iframe = document.getElementById('youtubeIframe');
        const closeBtn = document.getElementById('closeBtn');

        // 3. RENDER GALLERY
        function renderGallery() {
            videoData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'video-card';
                // Trigger modal with the corresponding Hadith ID
                card.onclick = () => openModal(item.hadithVideoId);

                card.innerHTML = `
                    <div class="thumbnail" style="background-image: url('${item.animationImg}')">
                        <div class="play-icon"></div>
                    </div>
                    <div class="card-content">
                        <h2 class="card-title">${item.title}</h2>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }

        // 4. MODAL LOGIC
        function openModal(videoId) {
            // Append ?autoplay=1 to bypass YouTube's default click-to-play constraint
            iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
            // Clear the src attribute so the video stops playing in the background
            iframe.src = ''; 
        }

        // 5. EVENT LISTENERS
        closeBtn.addEventListener('click', closeModal);
        
        // Close modal when clicking outside the video player
        modal.addEventListener('click', (e) => {
            if(e.target === modal) {
                closeModal();
            }
        });

        // Initialize script
        renderGallery();
    </script>
</body>
</html>
