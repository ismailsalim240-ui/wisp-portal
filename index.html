<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisp | Command Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --deep-blue: #020617;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.15);
            --text-main: #E2E8F0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--deep-blue);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, var(--deep-blue) 80%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .ticker-wrap { width: 100%; overflow: hidden; background: rgba(0,0,0,0.2); padding: 12px 0; font-size: 0.6rem; color: var(--gold); letter-spacing: 2px; border-bottom: 1px solid var(--glass-border); }
        .ticker { display: inline-block; white-space: nowrap; animation: marquee 40s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        header { text-align: center; padding: 60px 20px 20px 20px; }
        .logo-aura { font-size: 3.5rem; text-shadow: 0 0 30px rgba(212, 175, 55, 0.3); margin-bottom: 10px; }

        .container { width: 92%; max-width: 460px; padding-bottom: 120px; opacity: 0; transform: translateY(30px); transition: 1.5s ease; }
        .container.visible { opacity: 1; transform: translateY(0); }

        .glass-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; backdrop-filter: blur(20px); margin-bottom: 20px; transition: 0.5s; }
        .glass-card:hover { border-color: var(--gold); transform: scale(1.01); }

        .yield-val { font-size: 2rem; font-weight: 700; color: #2ecc71; }
        .timer-display { font-size: 2.2rem; font-weight: 300; margin: 15px 0; letter-spacing: 2px; }

        .action-btn { display: block; width: 100%; padding: 20px; border-radius: 15px; text-align: center; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; font-size: 0.7rem; border: none; cursor: pointer; transition: 0.3s; }
        .btn-gold { background: var(--gold); color: #000; box-shadow: 0 10px 30px rgba(212,175,55,0.2); }
        .btn-locked { background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.1); pointer-events: none; }

        .progress-track { height: 4px; background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden; margin: 15px 0; }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: 1.2s ease; }

        /* Chat System */
        .chat-trigger { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; z-index: 100; }
        .chat-window { display: none; position: fixed; bottom: 105px; right: 30px; width: 320px; height: 400px; background: #050a18; border: 1px solid var(--glass-border); border-radius: 25px; flex-direction: column; overflow: hidden; z-index: 100; }
        #chatBody { flex: 1; padding: 15px; overflow-y: auto; font-size: 0.75rem; display: flex; flex-direction: column; gap: 10px; }
        .ai-msg { border-left: 2px solid var(--gold); padding: 8px; background: rgba(255,255,255,0.05); border-radius: 0 10px 10px 0; }
        .user-msg { align-self: flex-end; padding: 8px; background: var(--gold); color: #000; border-radius: 10px 10px 0 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="ticker-wrap"><div class="ticker">&bull; SILENT MANAGEMENT ACTIVE &nbsp;&nbsp; &bull; VENTURE PULSE: STABLE &nbsp;&nbsp; &bull; NO-RIBBA PROTOCOL ACTIVE &nbsp;&nbsp;</div></div>

    <header><div class="logo-aura">🌙</div><h1 style="letter-spacing: 8px; font-size: 1.1rem;">WISP COMMAND</h1></header>

    <div class="container" id="main-ui">
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between;">
                <div><div class="yield-val">+12.8%</div><div style="font-size: 0.5rem; opacity: 0.5;">WEEKLY GROWTH</div></div>
                <div style="text-align: right; font-size: 0.6rem; color: var(--gold);">● ETHICAL VENTURE</div>
            </div>
            <canvas id="pulseChart" style="margin-top:15px;"></canvas>
        </div>

        <div class="glass-card" style="text-align: center;">
            <div id="status" style="font-size: 0.55rem; letter-spacing: 3px; opacity: 0.6;">PORTAL SECURED</div>
            <div id="timer" class="timer-display">SYNCING...</div>
            <button class="action-btn btn-locked" id="action-link">Portal Locked</button>
        </div>

        <div class="glass-card">
            <div style="font-size: 0.6rem; opacity: 0.7;">DAILY DISCIPLINE FLOW</div>
            <div class="progress-track"><div id="p-bar" class="progress-fill"></div></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <button onclick="runProgress()" style="background:rgba(255,255,255,0.02); color:white; border:1px solid var(--glass-border); padding:10px; border-radius:10px; font-size:0.5rem; cursor:pointer;">PRAYER</button>
                <button onclick="runProgress()" style="background:rgba(255,255,255,0.02); color:white; border:1px solid var(--glass-border); padding:10px; border-radius:10px; font-size:0.5rem; cursor:pointer;">SKILL</button>
                <button onclick="runProgress()" style="background:rgba(255,255,255,0.02); color:white; border:1px solid var(--glass-border); padding:10px; border-radius:10px; font-size:0.5rem; cursor:pointer;">GIVING</button>
            </div>
        </div>
    </div>

    <div class="chat-trigger" onclick="toggleChat()">✨</div>
    <div id="chatWindow" class="chat-window">
        <div style="background: var(--gold); color: #000; padding: 12px; font-weight: 700; font-size: 0.7rem;">INTELLIGENCE v4.0</div>
        <div id="chatBody"><div class="ai-msg">Salam, Operator. Standing by.</div></div>
        <div style="padding: 10px; border-top: 1px solid var(--glass-border); display: flex;">
            <input type="text" id="chatInput" placeholder="Command..." style="flex:1; background:transparent; border:none; color:white; outline:none; font-size:0.8rem;">
            <button onclick="sendMessage()" style="background:var(--gold); border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">➔</button>
        </div>
    </div>

    <script>
        window.onload = () => { document.getElementById('main-ui').classList.add('visible'); renderChart(); };

        function renderChart() {
            const ctx = document.getElementById('pulseChart').getContext('2d');
            new Chart(ctx, { type: 'line', data: { labels: [1,2,3,4,5], datasets: [{ data: [10,15,12,18,20], borderColor: '#D4AF37', fill: false, tension: 0.4 }] }, options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } } });
        }

        // TIMER FIX: Correctly identifies Friday and the Window
        function updateTimer() {
            const now = new Date();
            const day = now.getDay(); // 5 = Friday
            const hrs = now.getHours();
            const btn = document.getElementById('action-link');
            const status = document.getElementById('status');
            const timer = document.getElementById('timer');

            // Friday Window: 3:00 AM to 10:00 AM
            if (day === 5 && hrs >= 3 && hrs < 10) {
                status.innerText = "WINDOW ACTIVE";
                status.style.color = "#2ecc71";
                btn.className = "action-btn btn-gold";
                btn.innerText = "INITIALIZE";
                timer.innerText = "LIVE";
            } else {
                let next = new Date();
                let daysUntilFriday = (5 - day + 7) % 7;
                if (day === 5 && hrs >= 10) daysUntilFriday = 7;
                
                next.setDate(now.getDate() + daysUntilFriday);
                next.setHours(3, 0, 0, 0);
                
                const diff = next - now;
                const d = Math.floor(diff / 86400000), h = Math.floor((diff / 3600000) % 24), m = Math.floor((diff / 60000) % 60), s = Math.floor((diff / 1000) % 60);
                timer.innerText = `${d}D ${h}H ${m}M ${s}S`;
            }
        }
        setInterval(updateTimer, 1000); updateTimer();

        // Discipline Logic
        let score = parseInt(localStorage.getItem('wisp-score') || 0);
        function runProgress() {
            score = (score >= 100) ? 0 : score + 11.2;
            document.getElementById('p-bar').style.width = score + '%';
            localStorage.setItem('wisp-score', score);
        }
        document.getElementById('p-bar').style.width = score + '%';

        function toggleChat() { const w = document.getElementById('chatWindow'); w.style.display = (w.style.display === 'flex') ? 'none' : 'flex'; }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const body = document.getElementById('chatBody');
            if (!input.value.trim()) return;
            
            const uMsg = document.createElement('div'); uMsg.className = 'user-msg'; uMsg.innerText = input.value;
            body.appendChild(uMsg);
            
            const key = localStorage.getItem('gemini_key') || prompt("Enter Gemini API Key:");
            if (key) localStorage.setItem('gemini_key', key);

            const aMsg = document.createElement('div'); aMsg.className = 'ai-msg'; aMsg.innerText = "Syncing...";
            body.appendChild(aMsg);
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Persona: Wisp Intelligence. Elite, Sharia-compliant. User: " + input.value }] }] })
                });
                const data = await res.json();
                aMsg.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) { aMsg.innerText = "Error: Key required."; }
            input.value = ""; body.scrollTop = body.scrollHeight;
        }
    </script>
</body>
</html>
